<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d0e22"/>
      <stop offset="55%" style="stop-color:#651D4C"/>
      <stop offset="100%" style="stop-color:#4a1538"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c19a3c"/>
      <stop offset="100%" style="stop-color:#e8c96a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle texture overlay -->
  <rect width="1200" height="630" fill="url(#bg)" opacity="0.3"/>

  <!-- Top accent line (gold) -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#gold)"/>

  <!-- Bottom accent line (gold) -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#gold)"/>

  <!-- Left vertical accent -->
  <rect x="80" y="80" width="2" height="470" fill="white" opacity="0.15"/>

  <!-- Right vertical accent -->
  <rect x="1118" y="80" width="2" height="470" fill="white" opacity="0.15"/>

  <!-- Decorative circle (background) -->
  <circle cx="900" cy="315" r="260" fill="white" opacity="0.03"/>
  <circle cx="900" cy="315" r="200" fill="white" opacity="0.03"/>

  <!-- Gold horizontal rule (top) -->
  <rect x="110" y="130" width="80" height="1.5" fill="url(#gold)"/>

  <!-- EYEBROW text -->
  <text x="110" y="118" font-family="'Work Sans', Arial, sans-serif" font-size="13" font-weight="600"
    fill="#c19a3c" letter-spacing="5" text-rendering="optimizeLegibility">CEBU · MACTAN ISLAND · PHILIPPINES</text>

  <!-- MAIN HEADLINE -->
  <text x="110" y="235" font-family="Georgia, 'Times New Roman', serif" font-size="74" font-weight="400"
    fill="white" letter-spacing="-1" text-rendering="optimizeLegibility">Cebu Whitesand</text>
  <text x="110" y="315" font-family="Georgia, 'Times New Roman', serif" font-size="74" font-weight="400"
    fill="white" letter-spacing="-1" text-rendering="optimizeLegibility">Resort</text>

  <!-- Gold rule below headline -->
  <rect x="110" y="345" width="120" height="2" fill="url(#gold)"/>

  <!-- TAGLINE -->
  <text x="110" y="395" font-family="'Work Sans', Arial, sans-serif" font-size="22" font-weight="300"
    fill="white" opacity="0.75" letter-spacing="2" text-rendering="optimizeLegibility">Where Crystal Waters Meet White Sands</text>

  <!-- PILLS row -->
  <!-- Pill 1 -->
  <rect x="110" y="440" width="155" height="34" rx="17" fill="white" opacity="0.1"/>
  <text x="188" y="462" font-family="'Work Sans', Arial, sans-serif" font-size="12" font-weight="500"
    fill="white" text-anchor="middle" letter-spacing="1.5">86 GUEST ROOMS</text>

  <!-- Pill 2 -->
  <rect x="276" y="440" width="140" height="34" rx="17" fill="white" opacity="0.1"/>
  <text x="346" y="462" font-family="'Work Sans', Arial, sans-serif" font-size="12" font-weight="500"
    fill="white" text-anchor="middle" letter-spacing="1.5">ANAHATA SPA</text>

  <!-- Pill 3 -->
  <rect x="428" y="440" width="160" height="34" rx="17" fill="white" opacity="0.1"/>
  <text x="508" y="462" font-family="'Work Sans', Arial, sans-serif" font-size="12" font-weight="500"
    fill="white" text-anchor="middle" letter-spacing="1.5">BEACHFRONT DINING</text>

  <!-- BOOK DIRECT badge (right side) -->
  <rect x="840" y="230" width="230" height="60" rx="4" fill="url(#gold)"/>
  <text x="955" y="268" font-family="'Work Sans', Arial, sans-serif" font-size="15" font-weight="700"
    fill="#2d0e22" text-anchor="middle" letter-spacing="3">BOOK DIRECT</text>

  <!-- Best rate text -->
  <text x="955" y="315" font-family="'Work Sans', Arial, sans-serif" font-size="13" font-weight="400"
    fill="white" opacity="0.65" text-anchor="middle" letter-spacing="1">Best rate guaranteed</text>

  <!-- URL -->
  <text x="955" y="360" font-family="'Work Sans', Arial, sans-serif" font-size="15" font-weight="500"
    fill="white" opacity="0.45" text-anchor="middle" letter-spacing="1">cebu-whitesand-resort.com</text>

  <!-- Bottom watermark / address -->
  <text x="110" y="535" font-family="'Work Sans', Arial, sans-serif" font-size="12" font-weight="400"
    fill="white" opacity="0.35" letter-spacing="2">MARIBAGO BEACH · MACTAN ISLAND · LAPU-LAPU CITY · 6015 CEBU</text>
</svg>
